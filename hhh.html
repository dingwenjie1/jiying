<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>小丁</title>
		<link href='https://fonts.googleapis.com/css?family=Open+Sans+Condensed:700' rel='stylesheet' type='text/css'>
		<link href='https://fonts.googleapis.com/css?family=Pacifico:400' rel='stylesheet' type='text/css'>
	</head>
	<style type="text/css">
		html,body{
			margin: 20px;
			padding: 20px;
			background-color: antiquewhite;
			height: 100%;
			width: 100%;
		}
		.ml4 {
		  position: relative;
		  font-weight: 900;
		  font-size: 4.5em;
		}
		.ml4 .letters {
		  position: absolute;
		  margin: auto;
		  left: 0;
		  top: 0.3em;
		  right: 0;
		  opacity: 0; 
		}
		.wum {
		  color: #aa5500;
		  font-family: Open Sans Condensed, sans-serif;
		  text-align: center;
		  background-color: #ffff7f;
		  background-size: cover;
		  line-height: 3em;
		  padding-top: 16em;
		  padding-bottom: 18em;
		}
		
		.wum-r1 {
		  font-size: 8.7em;
		  font-weight: 700;
		  line-height: 1.1em;
		  text-transform: uppercase;
		}
		
		.wum-small {
		  font-family: Pacifico;
		  font-weight: 400;
		  font-size: 0.37em;
		  line-height: 1.35em;
		  display: inline-block;
		}

	</style>
	<body>
		<div class="wum">
		<h1 class="wum-r1 ml4">
		<div class="wum-small">
		  <span class="letters letters-1">我是</span>
		  <span class="letters letters-2">师朋!!</span>
		  <span class="letters letters-3">我!</span>
		  <span class="letters letters-4">很聪明</span>
		  <span class="letters letters-5">叫我</span>
		  <span class="letters letters-6">大聪明!</span>		
		</div>
		</h1>
		</div>

		
		<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/2.0.2/anime.min.js"></script>
	</body>
	<script type="text/javascript">
		var ml4 = {};
		ml4.opacityIn = [0,1];
		ml4.scaleIn = [0.2, 1];
		ml4.scaleOut = 3;
		ml4.durationIn = 800;
		ml4.durationOut = 600;
		ml4.delay = 500;
		
		anime.timeline({loop: true})
		  .add({
		    targets: '.ml4 .letters-1',
		    opacity: ml4.opacityIn,
		    scale: ml4.scaleIn,
		    duration: ml4.durationIn
		  })
		  .add({
		    targets: '.ml4 .letters-1',
		    opacity: 0,
		    scale: ml4.scaleOut,
		    duration: ml4.durationOut,
		    easing: "easeInExpo",
		    delay: ml4.delay
		  })
		  .add({
		    targets: '.ml4 .letters-2',
		    opacity: ml4.opacityIn,
		    scale: ml4.scaleIn,
		    duration: ml4.durationIn
		  })
		  .add({
		    targets: '.ml4 .letters-2',
		    opacity: 0,
		    scale: ml4.scaleOut,
		    duration: ml4.durationOut,
		    easing: "easeInExpo",
		    delay: ml4.delay
		  })
		 .add({
		   targets: '.ml4 .letters-3',
		   opacity: ml4.opacityIn,
		   scale: ml4.scaleIn,
		   duration: ml4.durationIn
		 })
		  .add({
		    targets: '.ml4 .letters-3',
		    opacity: 0,
		    scale: ml4.scaleOut,
		    duration: ml4.durationOut,
		    easing: "easeInExpo",
		    delay: ml4.delay
		  })
		  .add({
		    targets: '.ml4 .letters-4',
		    opacity: ml4.opacityIn,
		    scale: ml4.scaleIn,
		    duration: ml4.durationIn
		  })
		  .add({
		    targets: '.ml4 .letters-4',
		    opacity: 0,
		    scale: ml4.scaleOut,
		    duration: ml4.durationOut,
		    easing: "easeInExpo",
		    delay: ml4.delay
		  })
		  .add({
		    targets: '.ml4 .letters-5',
		    opacity: ml4.opacityIn,
		    scale: ml4.scaleIn,
		    duration: ml4.durationIn
		  })
		  .add({
		    targets: '.ml4 .letters-5',
		    opacity: 0,
		    scale: ml4.scaleOut,
		    duration: ml4.durationOut,
		    easing: "easeInExpo",
		    delay: ml4.delay
		  })
		  .add({
		    targets: '.ml4 .letters-6',
		    opacity: ml4.opacityIn,
		    scale: ml4.scaleIn,
		    duration: ml4.durationIn
		  })
		  .add({
		    targets: '.ml4 .letters-6',
		    opacity: 0,
		    scale: ml4.scaleOut,
		    duration: ml4.durationOut,
		    easing: "easeInExpo",
		    delay: ml4.delay
		  })
		  .add({
		    targets: '.ml4',
		    opacity: 0,
		    duration: 500,
		    delay: 500
		  });
	</script>
</html>
