<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>会员信息表</title>
		<link rel="stylesheet" type="text/css" href="css/111.css"/>
	</head>
	<body>
		<p>会员信息表</p>
		<form action="#" method="get">
			<fieldset id="">
				<legend>基本信息</legend>
				<label for="name">昵称：</label>
				<input type="text" id="name" value="" /><br><br>
				<label for="tx">头像：</label>
				<input type="file" id="tx" value="" />
			</fieldset>
			<fieldset id="">
				<legend>其他信息</legend>
				<p>性别：
					<input type="radio" name="xb" id="nan" value="1" />
					<label for="nan">男</label>
					<input type="radio" name="xb" id="nv" value="2" />
					<label for="nv">女</label>
				</p>
				<p>
					兴趣：
					<input type="checkbox" name="xq" id="tw" value="" />
					<label for="tw">跳舞</label>
					<input type="checkbox" name="xq" id="cg" value="" />
					<label for="cg">唱歌</label>
					<input type="checkbox" name="xq" id="yd" value="" />
					<label for="yd">运动</label>
				</p>
				<p>
					<label for="gxqm">个性签名：</label><br>
					<textarea rows="5" cols="40" id="gxqm"></textarea>
				</p>
			</fieldset>
			<p>	<input type="submit" value="提交" />
				<input type="reset" value="重置" />
			</p>
		</form>
	</body>
</html>
